name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/shape-plan-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
      - name: Build debug APK
        run: /tmp/gradle-8.10.2/bin/gradle :app:assembleDebug
      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: shape-plan-lab-android-debug
          path: android/shape-plan-android/app/build/outputs/apk/debug/app-debug.apk
      - name: Publish APK release
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/shape-plan-android/app/build/outputs/apk/debug/app-debug.apk
          name: Shape Plan Lab ${{ github.ref_name }}
          generate_release_notes: true
