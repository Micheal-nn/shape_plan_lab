<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>塑形计划实验室</title>
  <style>
    :root{--ink:#173a2d;--paper:#f5f2e8;--card:#fffdf7;--line:#d7ddd3;--green:#315a44;--lime:#dcecae;--red:#b63a32;--muted:#647168;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(150deg,#f8f5ed,#edf2e7);color:var(--ink);font:16px/1.45 sans-serif} main{max-width:860px;margin:auto;padding:16px 14px 40px} header{padding:16px 0 10px} h1{margin:0;font:700 29px/1.1 Georgia,serif} h2{margin:0 0 10px;font-size:20px} p{margin:8px 0} .sub,.hint{color:var(--muted);font-size:13px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center} button{border:0;border-radius:9px;padding:12px 14px;font:700 14px sans-serif;cursor:pointer}.lang{background:#e6edda;color:var(--green)} .primary{width:100%;background:var(--green);color:#fff;margin-top:12px}.card{margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:12px;background:var(--card);box-shadow:0 7px 24px rgba(25,58,45,.05)} .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px} label{display:block;color:#415249;font-size:13px;font-weight:700} input,select{width:100%;margin-top:5px;min-height:42px;padding:9px;border:1px solid #cbd4c9;border-radius:7px;color:var(--ink);background:#fff;font:16px sans-serif} .measure{margin-top:10px;display:grid;grid-template-columns:.8fr 1fr 1fr;gap:8px;align-items:center}.measure span{font-size:13px;font-weight:700}.measure input{margin:0} .section{margin-top:12px} .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.metric{padding:12px;background:#f0f5e8;border-radius:8px}.metric b{display:block;font:700 23px Georgia,serif}.metric small{color:var(--muted)} .warning{margin-top:10px;padding:10px;border-left:3px solid var(--red);background:#fff0ed;color:#74342f;font-size:13px}.red{border-color:var(--red)!important;background:#fff5f3}.chip{display:inline-block;margin:4px 4px 0 0;padding:3px 7px;border-radius:4px;background:var(--lime);font-size:11px;font-weight:700}.workout{padding:10px 0;border-top:1px solid var(--line)} .workout b{display:block}.exercise-note{margin:5px 0 0;color:var(--muted);font-size:13px}.result[hidden]{display:none} details{margin-top:10px;border-top:1px solid var(--line)} summary{padding:12px 0;cursor:pointer;font-weight:700}.exercise-list{display:grid;gap:10px;margin-top:4px}.exercise-card{padding:12px;border:1px solid #e1e6dc;border-radius:10px;background:#fbfaf5}.exercise-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.exercise-title{font-weight:800;color:var(--ink)}.exercise-tag{padding:3px 7px;border-radius:999px;background:#eef4df;color:#315a44;font-size:11px;font-weight:800;white-space:nowrap}.exercise-guide{margin-top:5px;color:var(--muted);font-size:13px}.exercise-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}.exercise-stat{padding:8px;border-radius:8px;background:#f0f5e8}.exercise-stat small{display:block;color:var(--muted);font-size:11px}.exercise-stat b{font-size:14px}.day-reason{margin-top:12px;padding:10px;border-radius:9px;background:#f7f2df;color:#4b4632;font-size:13px}.svg-tip{font-size:12px;color:var(--muted)} @media (max-width:560px){.grid,.measure{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.exercise-stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <header>
    <div class="top">
      <div>
        <h1 id="title">塑形计划实验室</h1>
        <p id="subtitle" class="sub">离线 Android 版 · 支持下载长图</p>
      </div>
      <button id="lang" class="lang" type="button">EN</button>
    </div>
  </header>

  <form id="form" class="card">
    <h2 id="profileTitle">基础指标与目标</h2>
    <div class="grid">
      <label id="sexLabel">性别
        <select id="sex"><option value="male">男性</option><option value="female">女性</option></select>
      </label>
      <label id="ageLabel">年龄<input id="age" type="number" value="30" min="16" max="90" /></label>
      <label id="heightLabel">身高（厘米）<input id="height" type="number" value="175" /></label>
      <label id="weightLabel">体重（千克）<input id="weight" type="number" value="82" step="0.1" /></label>
      <label id="fatLabel">体脂率（百分比）<input id="fat" type="number" value="24" step="0.1" /></label>
      <label id="goalLabel">目标类型
        <select id="goal"><option value="fat_loss">减脂 / 减重</option><option value="muscle_gain">增肌</option><option value="recomposition">体态重组</option></select>
      </label>
      <label id="targetWeightLabel">目标体重（千克）<input id="targetWeight" type="number" value="74" step="0.1" /></label>
      <label id="targetDateLabel">目标日期<input id="targetDate" type="date" /></label>
      <label id="frequencyLabel">每周训练次数<select id="frequency"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select></label>
      <label id="modeLabel">训练场景<select id="mode"><option value="gym">健身房</option><option value="bodyweight">自重 / 居家</option></select></label>
      <label id="experienceLabel">训练经验<select id="experience"><option value="novice">新手</option><option value="intermediate">中级</option><option value="advanced">高级</option></select></label>
    </div>

    <div class="section">
      <h2 id="circTitle">可选围度目标（厘米）</h2>
      <p id="circHint" class="hint">当前值和目标值需成对填写。腰围用于整体减脂评估，胸/臂/臀/大腿围可用于局部训练侧重。</p>
      <div class="measure">
        <span id="areaHead">部位</span><span id="currentHead">当前值</span><span id="targetHead">目标值</span>
        <span id="waistName">腰围</span><input id="waist" placeholder="91" type="number" /><input id="targetWaist" placeholder="86" type="number" />
        <span id="chestName">胸围</span><input id="chest" placeholder="100" type="number" /><input id="targetChest" placeholder="104" type="number" />
        <span id="hipName">臀围</span><input id="hip" placeholder="98" type="number" /><input id="targetHip" placeholder="101" type="number" />
        <span id="armName">臂围</span><input id="arm" placeholder="34" type="number" /><input id="targetArm" placeholder="36" type="number" />
        <span id="thighName">大腿围</span><input id="thigh" placeholder="57" type="number" /><input id="targetThigh" placeholder="60" type="number" />
      </div>
    </div>

    <div class="section">
      <h2 id="prTitle">个人纪录与训练强度</h2>
      <p id="prHint" class="hint">填写“重量 + 次数”后，应用会估算个人最大力量，再据此给出训练重量；未填写时使用主观用力等级。</p>
      <div class="grid">
        <label id="benchLabel">卧推纪录（千克 × 次）<input id="benchWeight" type="number" placeholder="60" /> <input id="benchReps" type="number" placeholder="8" /></label>
        <label id="squatLabel">深蹲纪录（千克 × 次）<input id="squatWeight" type="number" placeholder="90" /> <input id="squatReps" type="number" placeholder="6" /></label>
        <label id="rowLabel">划船/下拉纪录（千克 × 次）<input id="rowWeight" type="number" placeholder="50" /> <input id="rowReps" type="number" placeholder="10" /></label>
        <label id="hingeLabel">硬拉/臀推纪录（千克 × 次）<input id="hingeWeight" type="number" placeholder="100" /> <input id="hingeReps" type="number" placeholder="5" /></label>
      </div>
    </div>

    <button id="generate" class="primary" type="submit">生成科学计划</button>
  </form>

  <section id="result" class="card result" hidden></section>
  <section id="feedback" class="card result" hidden></section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const t = {
  zh: {
    title: '塑形计划实验室', subtitle: '离线 Android 版 · 支持下载长图', profile: '基础指标与目标', sex: '性别', age: '年龄', height: '身高（厘米）', weight: '体重（千克）', fat: '体脂率（百分比）', goal: '目标类型', targetWeight: '目标体重（千克）', targetDate: '目标日期', frequency: '每周训练次数', mode: '训练场景', experience: '训练经验', circ: '可选围度目标（厘米）', hint: '当前值和目标值需成对填写。腰围用于整体减脂评估，胸/臂/臀/大腿围可用于局部训练侧重。', area: '部位', current: '当前值', target: '目标值', waist: '腰围', chest: '胸围', hip: '臀围', arm: '臂围', thigh: '大腿围', pr: '个人纪录与训练强度', prHint: '填写“重量 + 次数”后，应用会估算个人最大力量，再据此给出训练重量；未填写时使用主观用力等级。', bench: '卧推纪录（千克 × 次）', squat: '深蹲纪录（千克 × 次）', row: '划船/下拉纪录（千克 × 次）', hinge: '硬拉/臀推纪录（千克 × 次）', generate: '生成科学计划', plan: '你的计划', cal: '每日热量', protein: '蛋白质', fatText: '脂肪', carb: '碳水化合物', logic: '计划生成逻辑', science: '科学依据', strength: '训练强度处方', why: '为什么这样安排', workouts: '每周训练安排', download: '导出长图', feedback: '执行反馈与计划调整', feedbackHint: '填写完成次数、近期平均热量和当前体重后，应用会调整后续计划。', doneSessions: '本周完成训练次数', averageCalories: '近期平均热量', currentWeight: '当前体重', applyFeedback: '根据反馈调整后续计划', adjustmentResult: '调整结果', useRpe: '工作组采用主观用力等级', reps: '次余力', noPr: '未填写个人纪录，使用主观用力等级与次数区间。', oneRm: '估算个人最大力量', load: '推荐负荷', sets: '组', kilos: '千克', minutes: '分钟', length: '长图', fat_loss: '减脂 / 减重', muscle_gain: '增肌', recomposition: '体态重组', male: '男性', female: '女性', novice: '新手', intermediate: '中级', advanced: '高级', gym: '健身房', bodyweight: '自重 / 居家' },
  en: {
    title: 'Shape Plan Lab', subtitle: 'Offline Android edition · long-image download supported', profile: 'Baseline metrics and goal', sex: 'Sex', age: 'Age', height: 'Height (cm)', weight: 'Weight (kg)', fat: 'Body fat (%)', goal: 'Goal type', targetWeight: 'Target weight (kg)', targetDate: 'Target date', frequency: 'Weekly sessions', mode: 'Training setting', experience: 'Training experience', circ: 'Optional circumference targets (cm)', hint: 'Enter current and target values as a pair. Waist guides overall fat-loss evaluation, while chest/arm/hip/thigh values can shift training emphasis.', area: 'Area', current: 'Current', target: 'Target', waist: 'Waist', chest: 'Chest', hip: 'Hip', arm: 'Arm', thigh: 'Thigh', pr: 'Personal records and intensity', prHint: 'Enter weight + reps to estimate 1RM, then use that to set training loads. Otherwise the app uses effort-based guidance.', bench: 'Bench record (kg × reps)', squat: 'Squat record (kg × reps)', row: 'Row / pulldown record (kg × reps)', hinge: 'Deadlift / hip-thrust record (kg × reps)', generate: 'Generate plan', plan: 'Your plan', cal: 'Daily calories', protein: 'Protein', fatText: 'Fat', carb: 'Carbohydrate', logic: 'Plan generation logic', science: 'Scientific basis', strength: 'Intensity prescription', why: 'Why this plan', workouts: 'Weekly training schedule', download: 'Export long image', feedback: 'Execution feedback and plan adjustment', feedbackHint: 'Enter session completion, recent average calories, and current weight so the app can adjust the next plan.', doneSessions: 'Completed sessions this week', averageCalories: 'Recent average calories', currentWeight: 'Current weight', applyFeedback: 'Adjust future plan from feedback', adjustmentResult: 'Adjustment result', useRpe: 'Working sets use effort rating', reps: 'reps in reserve', noPr: 'No personal records entered; the app will use effort rating and rep ranges.', oneRm: 'Estimated 1RM', load: 'Recommended load', sets: 'sets', kilos: 'kg', minutes: 'min', length: 'Long image', fat_loss: 'Fat loss', muscle_gain: 'Muscle gain', recomposition: 'Recomposition', male: 'Male', female: 'Female', novice: 'Novice', intermediate: 'Intermediate', advanced: 'Advanced', gym: 'Gym', bodyweight: 'Bodyweight / home' }
};

let en = false;
let currentPlan = null;
let currentInput = null;
let currentAdjustment = null;
let currentFeedback = null;

const RANGES = {
  fat_loss: {
    gym: { chest: [65, 75], squat: [70, 80], row: [65, 75], hinge: [70, 80] },
    bodyweight: { chest: [10, 14], squat: [12, 18], row: [10, 14], hinge: [12, 16] }
  },
  muscle_gain: {
    gym: { chest: [70, 80], squat: [75, 85], row: [70, 80], hinge: [75, 85] },
    bodyweight: { chest: [8, 12], squat: [10, 16], row: [8, 12], hinge: [10, 14] }
  },
  recomposition: {
    gym: { chest: [67, 77], squat: [72, 82], row: [67, 77], hinge: [72, 82] },
    bodyweight: { chest: [9, 13], squat: [11, 17], row: [9, 13], hinge: [11, 15] }
  }
};

const PR_IDS = ['bench', 'squat', 'row', 'hinge'];
const SAFE_RATE = { fat_loss: 0.0075, muscle_gain: 0.0035, recomposition: 0.0025 };

function tx() { return t[en ? 'en' : 'zh']; }
function text(id, key) { $(id).textContent = tx()[key]; }
function label(id, key) { $(id).firstChild.textContent = tx()[key]; }
function fmt(n) { return Math.round(n * 10) / 10; }
function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }
function estimate1RM(load, reps) { return load > 0 && reps > 0 ? load * (1 + reps / 30) : null; }
function getPr(key) { const w = Number($(key + 'Weight').value); const r = Number($(key + 'Reps').value); return w > 0 && r > 0 ? estimate1RM(w, r) : null; }
function parseNum(id) { const v = Number($(id).value); return Number.isFinite(v) && v > 0 ? v : null; }
function parseDateValue(value) { if (!value) return null; const date = new Date(`${value}T00:00:00`); return Number.isNaN(date.getTime()) ? null : date; }
function weeksUntil(date) { return Math.max(1, Math.ceil((date.getTime() - Date.now()) / 604800000)); }
function highlight(id) { $(id).classList.add('red'); }
function recommendationFromPr(estimate, percent) { return fmt((estimate * percent) / 100); }

function normalizeInput() {
  return {
    sex: $('sex').value,
    age: Number($('age').value),
    heightCm: Number($('height').value),
    weightKg: Number($('weight').value),
    bodyFatPct: parseNum('fat'),
    goal: { type: $('goal').value, targetWeightKg: parseNum('targetWeight'), targetDate: $('targetDate').value || '' },
    trainingMode: $('mode').value,
    frequencyPerWeek: Number($('frequency').value),
    trainingExperience: $('experience').value,
    currentCircumference: { waistCm: parseNum('waist'), chestCm: parseNum('chest'), hipCm: parseNum('hip'), armCm: parseNum('arm'), thighCm: parseNum('thigh') },
    goalCircumference: { waistCm: parseNum('targetWaist'), chestCm: parseNum('targetChest'), hipCm: parseNum('targetHip'), armCm: parseNum('targetArm'), thighCm: parseNum('targetThigh') },
    pr: { bench: getPr('bench'), squat: getPr('squat'), row: getPr('row'), hinge: getPr('hinge') }
  };
}

function normalizeGoals(input) {
  const notes = [];
  const weight = input.weightKg;
  const goal = input.goal.type;
  const targetDate = parseDateValue(input.goal.targetDate);

  if (targetDate && targetDate.getTime() < Date.now()) {
    notes.push(en ? 'The target date is in the past; the app will still generate a plan from the current state.' : '目标日期已早于当前时间；应用仍会基于当前状态生成计划。');
  }

  if (goal === 'fat_loss' && input.goal.targetWeightKg != null && input.goal.targetWeightKg >= weight) {
    input.goal.targetWeightKg = fmt(weight * 0.98);
    highlight('targetWeight');
    notes.push(en ? 'Target weight was lowered below current weight for fat loss.' : '减脂目标体重已调整为低于当前体重。');
  }
  if (goal === 'muscle_gain' && input.goal.targetWeightKg != null && input.goal.targetWeightKg <= weight) {
    input.goal.targetWeightKg = fmt(weight * 1.02);
    highlight('targetWeight');
    notes.push(en ? 'Target weight was raised above current weight for muscle gain.' : '增肌目标体重已调整为高于当前体重。');
  }

  if (targetDate && input.goal.targetWeightKg != null) {
    const weeks = weeksUntil(targetDate);
    const maxShift = weight * SAFE_RATE[goal] * weeks;
    if (goal === 'fat_loss') {
      const feasible = fmt(weight - maxShift);
      if (input.goal.targetWeightKg < feasible) {
        input.goal.targetWeightKg = feasible;
        highlight('targetWeight');
        notes.push(en ? 'The weight target was lifted to keep the loss rate realistic for the selected deadline.' : '已抬高目标体重，以匹配所选日期下可实现的减重速度。');
      }
    } else if (goal === 'muscle_gain') {
      const feasible = fmt(weight + maxShift);
      if (input.goal.targetWeightKg > feasible) {
        input.goal.targetWeightKg = feasible;
        highlight('targetWeight');
        notes.push(en ? 'The weight target was reduced to keep the gain rate realistic for the selected deadline.' : '已下调目标体重，以匹配所选日期下可实现的增重速度。');
      }
    } else if (goal === 'recomposition') {
      const maxMove = weight * SAFE_RATE.recomposition * weeks;
      const delta = input.goal.targetWeightKg - weight;
      if (Math.abs(delta) > maxMove) {
        input.goal.targetWeightKg = fmt(weight + Math.sign(delta) * maxMove);
        highlight('targetWeight');
        notes.push(en ? 'The target weight was narrowed to keep recomposition within a sustainable range.' : '已收窄目标体重，使体态重组保持在可持续范围内。');
      }
    }
  }

  const fieldMap = { waist: 'targetWaist', chest: 'targetChest', hip: 'targetHip', arm: 'targetArm', thigh: 'targetThigh' };
  ['waist', 'chest', 'hip', 'arm', 'thigh'].forEach((key) => {
    const currentValue = input.currentCircumference[`${key}Cm`];
    const targetValue = input.goalCircumference[`${key}Cm`];
    if (currentValue == null || targetValue == null) return;
    const field = fieldMap[key];
    if (key === 'waist' && targetValue >= currentValue) {
      input.goalCircumference[`${key}Cm`] = fmt(currentValue * 0.97);
      highlight(field);
      notes.push(en ? 'Waist target was lowered below the current value.' : '腰围目标已调整为低于当前值。');
    }
    if (['chest', 'hip', 'arm', 'thigh'].includes(key) && targetValue <= currentValue) {
      input.goalCircumference[`${key}Cm`] = fmt(currentValue * 1.03);
      highlight(field);
      notes.push(en ? `${tx()[key]} target was raised above the current value.` : `${tx()[key]}目标已调整为高于当前值。`);
    }
  });

  return notes;
}

function applyLanguage() {
  const x = tx();
  document.documentElement.lang = en ? 'en' : 'zh-CN';
  document.title = x.title;
  $('lang').textContent = en ? '中文' : 'EN';
  [['title', 'title'], ['subtitle', 'subtitle'], ['profileTitle', 'profile'], ['circTitle', 'circ'], ['circHint', 'hint'], ['prTitle', 'pr'], ['prHint', 'prHint'], ['generate', 'generate']].forEach(([id, key]) => text(id, key));
  ['sexLabel', 'ageLabel', 'heightLabel', 'weightLabel', 'fatLabel', 'goalLabel', 'targetWeightLabel', 'targetDateLabel', 'frequencyLabel', 'modeLabel', 'experienceLabel', 'benchLabel', 'squatLabel', 'rowLabel', 'hingeLabel'].forEach((id, i) => label(id, ['sex', 'age', 'height', 'weight', 'fat', 'goal', 'targetWeight', 'targetDate', 'frequency', 'mode', 'experience', 'bench', 'squat', 'row', 'hinge'][i]));
  ['areaHead', 'currentHead', 'targetHead', 'waistName', 'chestName', 'hipName', 'armName', 'thighName'].forEach((id, i) => $(id).textContent = [x.area, x.current, x.target, x.waist, x.chest, x.hip, x.arm, x.thigh][i]);
  ['sex', 'goal', 'mode', 'experience'].forEach((id) => {
    const sel = $(id);
    [...sel.options].forEach((o) => {
      if (o.value === 'bodyweight') o.textContent = x.bodyweight;
      else if (o.value === 'fat_loss') o.textContent = x.fat_loss;
      else if (o.value === 'muscle_gain') o.textContent = x.muscle_gain;
      else if (o.value === 'recomposition') o.textContent = x.recomposition;
      else if (o.value === 'male') o.textContent = x.male;
      else if (o.value === 'female') o.textContent = x.female;
      else if (o.value === 'gym') o.textContent = x.gym;
      else if (o.value === 'novice') o.textContent = x.novice;
      else if (o.value === 'intermediate') o.textContent = x.intermediate;
      else if (o.value === 'advanced') o.textContent = x.advanced;
    });
  });
}

function buildPlan(input, adjustment = null) {
  const notes = normalizeGoals(input);
  const weight = input.weightKg;
  const age = input.age;
  const height = input.heightCm;
  const bodyFatPct = input.bodyFatPct ?? (input.goal.type === 'fat_loss' ? 24 : 18);
  const leanMass = weight * (1 - bodyFatPct / 100);
  const bmr = input.bodyFatPct
    ? 370 + 21.6 * leanMass
    : (input.sex === 'male' ? 10 * weight + 6.25 * height - 5 * age + 5 : 10 * weight + 6.25 * height - 5 * age - 161);
  const activity = { novice: 1.35, intermediate: 1.5, advanced: 1.65 }[input.trainingExperience] ?? 1.45;
  const tdee = Math.round(bmr * activity);
  const goal = input.goal.type;
  const targetDate = parseDateValue(input.goal.targetDate);
  const weeks = targetDate ? weeksUntil(targetDate) : 12;
  const targetDelta = input.goal.targetWeightKg != null ? input.goal.targetWeightKg - weight : null;

  let calories;
  if (goal === 'fat_loss') {
    const deficit = targetDelta != null && targetDelta < 0 ? clamp(Math.abs(targetDelta) * 7700 / weeks / 7, 300, 700) : (bodyFatPct >= 25 ? 550 : 400);
    calories = Math.max(1200, Math.round(tdee - deficit));
  } else if (goal === 'muscle_gain') {
    const surplus = targetDelta != null && targetDelta > 0 ? clamp(targetDelta * 7700 / weeks / 7, 150, 350) : 250;
    calories = Math.max(1500, Math.round(tdee + surplus));
  } else {
    calories = Math.max(1400, Math.round(tdee - (bodyFatPct >= 20 ? 150 : 50)));
  }

  if (adjustment?.calorieDelta) calories = Math.max(1200, calories + adjustment.calorieDelta);

  const proteinFactor = goal === 'fat_loss' ? 2.0 : goal === 'muscle_gain' ? 1.8 : 1.9;
  const fatFactor = goal === 'muscle_gain' ? 0.7 : 0.8;
  const protein = Math.round(weight * proteinFactor);

    { title: en ? '1. Input and target check' : '1. 输入与目标校验', body: en ? 'The app checks whether current weight, target weight, target date, body-fat level, and optional circumference targets point in the same direction. When the request conflicts with the selected goal, the app adjusts the target to the nearest feasible value.' : '应用会检查当前体重、目标体重、目标日期、体脂率与可选围度目标是否方向一致。当目标方向与目标类型冲突时，系统会将目标调整到最接近且可执行的值。' },

  ];

  const reasonSections = [
    { title: en ? '1. Why this weekly split' : '1. 为什么这样分周', body: en ? 'The split alternates push, lower-body, pull, and conditioning so the largest movement patterns are trained without stacking too much fatigue into one day. That makes the plan easier to follow and easier to review.' : '周计划按推、下肢、拉、有氧与核心交替安排，避免把过多疲劳堆到同一天，同时让主要动作模式都能被覆盖。这样更容易执行，也更容易复评。' },
    { title: en ? '2. Why these exercises' : '2. 为什么是这些动作', body: en ? 'Bench press, squat, row, hinge work, lunges, pulldowns, and core drills are standard, widely used patterns. They are easy to scale, easy to coach, and easy to tie to a clear load prescription.' : '卧推、深蹲、划船、髋主导动作、弓步、下拉和核心训练都是标准化程度高、使用面广的模式。它们容易分级、容易指导，也容易对应明确的负荷处方。' },
    { title: en ? '3. Why the plan can change later' : '3. 为什么计划可以后续调整', body: en ? 'The feedback panel is not decorative. It is the signal used to reduce weekly volume, lower calories, or preserve the current prescription when the user is executing well, so the next plan reflects real-world adherence.' : '反馈面板不是装饰。它会在执行不足时降低周训练量、在进展偏慢时调整热量、在执行良好时保留当前方案，让下一版计划真正反映现实执行情况。' }
  ];

  return { calories, protein, fat, carb, workouts: adjustedWorkouts, intensity, prSummary, logicSections, scienceSections, reasonSections, notes };
}

function renderWorkoutDay(day) {
  const x = tx();
  const labels = en
    ? { guide: 'Guide', weight: 'Suggested weight', reps: 'Suggested reps', sets: 'Suggested sets', pr: 'PR estimate', reason: 'Reason' }
    : { guide: '动作指导', weight: '建议重量', reps: '建议次数', sets: '建议组数', pr: 'PR估计', reason: '安排原因' };
  return `<details class="workout"><summary>${day.title}</summary><p class="exercise-note">${day.note}</p><div class="exercise-list">${day.blocks.map((block) => `<article class="exercise-card"><div class="exercise-head"><div class="exercise-title">${block.name}</div><span class="exercise-tag">${block.tag}</span></div><div class="exercise-guide">${labels.guide}：${block.guide}</div><div class="exercise-stats"><div class="exercise-stat"><small>${labels.weight}</small><b>${block.load}</b></div><div class="exercise-stat"><small>${labels.reps}</small><b>${block.reps}</b></div><div class="exercise-stat"><small>${labels.sets}</small><b>${block.sets}</b></div></div><p class="exercise-note">${labels.pr}：${block.prBasis}</p><p class="exercise-note">${labels.reason}：${block.reason}</p></article>`).join('')}</div><div class="day-reason">${labels.reason}：${day.reason}</div></details>`;
}

function renderFeedback() {
  const x = tx();
  const resultHtml = currentFeedback ? `<div class="warning"><b>${x.adjustmentResult}</b><br>${currentFeedback.notes.map((note) => `• ${note}`).join('<br>')}<br>${x.cal}：${currentPlan.calories}</div>` : `<p class="hint">${x.feedbackHint}</p>`;
  $('feedback').hidden = false;
  $('feedback').innerHTML = `<h2>${x.feedback}</h2><div class="grid"><label>${x.doneSessions}<input id="doneSessions" type="number" min="0" max="7" value="${currentInput.frequencyPerWeek}" /></label><label>${x.averageCalories}<input id="averageCalories" type="number" value="${currentPlan.calories}" /></label><label>${x.currentWeight}<input id="feedbackWeight" type="number" step="0.1" value="${currentInput.weightKg}" /></label></div><button class="primary" type="button" id="applyFeedback">${x.applyFeedback}</button>${resultHtml}`;
  $('applyFeedback').addEventListener('click', applyFeedback);
}

function renderPlan(plan) {
  const x = tx();
  $('result').hidden = false;
  $('result').innerHTML = `<h2>${x.plan}</h2>${plan.notes.map((note) => `<p class="warning">${note}</p>`).join('')}<div class="metrics"><div class="metric"><b>${plan.calories}</b><small>${x.cal}</small></div><div class="metric"><b>${plan.protein}g</b><small>${x.protein}</small></div><div class="metric"><b>${plan.fat}g</b><small>${x.fatText}</small></div><div class="metric"><b>${plan.carb}g</b><small>${x.carb}</small></div></div><div class="card section"><h2>${x.pr}</h2>${plan.prSummary.length ? plan.prSummary.map((item) => `<div class="workout"><b>${item.name}</b><span>${x.oneRm} ${item.oneRm.toFixed(1)} ${x.kilos} · ${x.load} ${item.recommended} ${x.kilos}</span><p class="exercise-note">${item.reason}</p></div>`).join('') : `<p class="hint">${x.noPr}</p>`}</div><div class="card section"><h2>${x.strength}</h2><p>${plan.intensity.summary}</p><div>${plan.intensity.tags.map((tag) => `<span class="chip">${tag}</span>`).join('')}</div><p class="exercise-note">${plan.intensity.progress}</p></div><details class="card section" open><summary>${x.workouts}</summary><p class="hint">${en ? 'Tap a day to see the full exercise combination, recommended load, sets, and reps.' : '点击某一天可查看完整动作组合、推荐负荷、组数和次数范围。'}</p>${plan.workouts.map(renderWorkoutDay).join('')}</details><details class="card section"><summary>${x.logic}</summary>${plan.logicSections.map((item) => `<details class="section" open><summary>${item.title}</summary><p>${item.body}</p></details>`).join('')}</details><details class="card section"><summary>${x.science}</summary>${plan.scienceSections.map((item) => `<details class="section" open><summary>${item.title}</summary><p>${item.body}</p></details>`).join('')}</details><details class="card section"><summary>${x.why}</summary>${plan.reasonSections.map((item) => `<details class="section" open><summary>${item.title}</summary><p>${item.body}</p></details>`).join('')}</details><button class="primary section" type="button" id="download">${x.download}</button>`;
  $('download').addEventListener('click', () => exportLongImage(plan));
  renderFeedback();
  $('result').scrollIntoView({ behavior: 'smooth' });
}

function applyFeedback() {
  if (!currentPlan || !currentInput) return;
  const done = Number($('doneSessions').value);
  const avgCalories = Number($('averageCalories').value);
  const nowWeight = Number($('feedbackWeight').value);
  const notes = [];
  let setDelta = 0;
  let calorieDelta = 0;

  if (done < currentInput.frequencyPerWeek) {
    setDelta = -1;
    notes.push(en ? 'Training completion was below plan; next week reduces one accessory set and keeps the main lifts.' : '本周训练完成率低于计划；下周减少 1 个辅助工作组，保留主要动作。');
  } else {
    notes.push(en ? 'Training completion matched the plan; keep the current split and progression rule.' : '本周训练完成率达到计划；保持当前分化和进阶规则。');
  }

  if (currentInput.goal.type === 'fat_loss' && nowWeight >= currentInput.weightKg - 0.2 && avgCalories >= currentPlan.calories) {
    calorieDelta = -100;
    notes.push(en ? 'Fat-loss trend is slower than expected; the next target is reduced by 100 kcal/day.' : '减脂趋势慢于预期；下一阶段每日热量下调 100 千卡。');
  }
  if (currentInput.goal.type === 'muscle_gain' && nowWeight <= currentInput.weightKg + 0.1 && avgCalories <= currentPlan.calories) {
    calorieDelta = 120;
    notes.push(en ? 'Muscle-gain trend is slower than expected; the next target adds 120 kcal/day.' : '增肌趋势慢于预期；下一阶段每日热量上调 120 千卡。');
  }

  currentAdjustment = { setDelta, calorieDelta };
  currentFeedback = { notes };
  currentPlan = buildPlan(currentInput, currentAdjustment);
  renderPlan(currentPlan);
}

function exportLongImage(plan) {
  const lines = [
    en ? 'Shape Plan Lab' : '塑形计划实验室',
    `${tx().cal} ${plan.calories}`,
    `${tx().protein} ${plan.protein}g`,
    `${tx().fatText} ${plan.fat}g`,
    `${tx().carb} ${plan.carb}g`,
    en ? 'Intensity prescription' : '训练强度处方',
    plan.intensity.summary,
    ...plan.intensity.tags.map((value) => `• ${value}`),
    ...plan.logicSections.flatMap((section) => [section.title, section.body]),
    ...plan.workouts.flatMap((day) => [
      day.title,
      day.note,
      day.reason,
      ...day.blocks.map((block) => en
        ? `${block.name} (${block.guide}) -- ${block.load} -- ${block.reps} -- ${block.sets} sets (${block.prBasis})`
        : `${block.name}（${block.guide}）-- ${block.load} -- ${block.reps} -- ${block.sets}组（${block.prBasis}）`)
    ]),
    en ? 'Why this plan' : '为什么这样安排',
    ...plan.reasonSections.flatMap((section) => [section.title, section.body])
  ];
  const width = 1080;
  const lineHeight = 28;
  const height = Math.max(760, 110 + lines.length * lineHeight);
  const esc = (s) => String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
  const text = lines.map((line, i) => `<text x="64" y="${96 + i * lineHeight}" font-size="${i === 0 ? 34 : 18}" font-weight="${i === 0 ? 700 : 400}" fill="${i === 0 ? '#163022' : '#2f4b3a'}">${esc(line)}</text>`).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}"><rect width="100%" height="100%" fill="#f4f1e8"/><rect x="34" y="32" width="${width - 68}" height="${height - 64}" rx="8" fill="#fbfaf5" stroke="#d8ddd4"/>${text}<text x="64" y="${height - 44}" font-size="14" fill="#637269">${esc(new Date().toISOString().slice(0, 10))}</text></svg>`;
  if (window.ShapePlanAndroid && window.ShapePlanAndroid.saveSvg) {
    window.ShapePlanAndroid.saveSvg(svg, `shape-plan-${en ? 'en' : 'zh'}-${Date.now()}.svg`);
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
    a.download = `shape-plan-${Date.now()}.svg`;
    a.click();
    URL.revokeObjectURL(a.href);
  }
}

function generate(e) {
  if (e) e.preventDefault();
  document.querySelectorAll('.red').forEach((item) => item.classList.remove('red'));
  currentInput = normalizeInput();
  currentAdjustment = null;
  currentFeedback = null;
  currentPlan = buildPlan(currentInput);
  renderPlan(currentPlan);
}

function refreshFromLanguage() {
  if (!currentInput) return;
  currentPlan = buildPlan(currentInput, currentAdjustment);
  renderPlan(currentPlan);
}

function setInitialDate() {
  const today = new Date();
  today.setDate(today.getDate() + 90);
  $('targetDate').value = today.toISOString().slice(0, 10);
}

$('form').addEventListener('submit', generate);
$('lang').addEventListener('click', () => { en = !en; applyLanguage(); refreshFromLanguage(); });

setInitialDate();
applyLanguage();
</script>
</body>
</html>
