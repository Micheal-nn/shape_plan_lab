<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>塑形计划实验室</title>
  <style>
    :root{--ink:#173a2d;--paper:#f5f2e8;--card:#fffdf7;--line:#d7ddd3;--green:#315a44;--lime:#dcecae;--red:#b63a32;--muted:#647168;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(150deg,#f8f5ed,#edf2e7);color:var(--ink);font:16px/1.45 sans-serif} main{max-width:860px;margin:auto;padding:16px 14px 40px} header{padding:16px 0 10px} h1{margin:0;font:700 29px/1.1 Georgia,serif} h2{margin:0 0 10px;font-size:20px} p{margin:8px 0} .sub,.hint{color:var(--muted);font-size:13px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center} button{border:0;border-radius:9px;padding:12px 14px;font:700 14px sans-serif;cursor:pointer}.lang{background:#e6edda;color:var(--green)} .primary{width:100%;background:var(--green);color:#fff;margin-top:12px}.card{margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:12px;background:var(--card);box-shadow:0 7px 24px rgba(25,58,45,.05)} .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px} label{display:block;color:#415249;font-size:13px;font-weight:700} input,select{width:100%;margin-top:5px;min-height:42px;padding:9px;border:1px solid #cbd4c9;border-radius:7px;color:var(--ink);background:#fff;font:16px sans-serif} .measure{margin-top:10px;display:grid;grid-template-columns:.8fr 1fr 1fr;gap:8px;align-items:center}.measure span{font-size:13px;font-weight:700}.measure input{margin:0} .section{margin-top:12px} .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.metric{padding:12px;background:#f0f5e8;border-radius:8px}.metric b{display:block;font:700 23px Georgia,serif}.metric small{color:var(--muted)} .warning{margin-top:10px;padding:10px;border-left:3px solid var(--red);background:#fff0ed;color:#74342f;font-size:13px}.red{border-color:var(--red)!important;background:#fff5f3}.chip{display:inline-block;margin:4px 4px 0 0;padding:3px 7px;border-radius:4px;background:var(--lime);font-size:11px;font-weight:700}.workout{padding:10px 0;border-top:1px solid var(--line)} .workout b{display:block}.exercise-note{margin:5px 0 0;color:var(--muted);font-size:13px}.result[hidden]{display:none} details{margin-top:10px;border-top:1px solid var(--line)} summary{padding:12px 0;cursor:pointer;font-weight:700} .two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px} .svg-tip{font-size:12px;color:var(--muted)} @media (max-width:560px){.grid,.two-col{grid-template-columns:1fr}.measure{grid-template-columns:.75fr 1fr 1fr}}
  </style>
</head>
<body>
<main>
  <header>
    <div class="top">
      <div>
        <h1 id="title">塑形计划实验室</h1>
        <p id="subtitle" class="sub">离线 Android 版 · 支持下载长图</p>
      </div>
      <button id="lang" class="lang" type="button">EN</button>
    </div>
  </header>

  <form id="form" class="card">
    <h2 id="profileTitle">基础指标与目标</h2>
    <div class="grid">
      <label id="sexLabel">性别
        <select id="sex"><option value="male">男性</option><option value="female">女性</option></select>
      </label>
      <label id="ageLabel">年龄<input id="age" type="number" value="30" min="16" max="90" /></label>
      <label id="heightLabel">身高（厘米）<input id="height" type="number" value="175" /></label>
      <label id="weightLabel">体重（千克）<input id="weight" type="number" value="82" step="0.1" /></label>
      <label id="fatLabel">体脂率（百分比）<input id="fat" type="number" value="24" step="0.1" /></label>
      <label id="goalLabel">目标类型
        <select id="goal"><option value="fat_loss">减脂 / 减重</option><option value="muscle_gain">增肌</option><option value="recomposition">体态重组</option></select>
      </label>
      <label id="targetWeightLabel">目标体重（千克）<input id="targetWeight" type="number" value="74" step="0.1" /></label>
      <label id="frequencyLabel">每周训练次数<select id="frequency"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select></label>
      <label id="modeLabel">训练场景<select id="mode"><option value="gym">健身房</option><option value="bodyweight">自重 / 居家</option></select></label>
      <label id="experienceLabel">训练经验<select id="experience"><option value="novice">新手</option><option value="intermediate">中级</option><option value="advanced">高级</option></select></label>
    </div>

    <div class="section">
      <h2 id="circTitle">可选围度目标（厘米）</h2>
      <p id="circHint" class="hint">当前值和目标值需成对填写。腰围用于整体减脂评估，胸/臂/臀/大腿围可用于局部训练侧重。</p>
      <div class="measure">
        <span id="areaHead">部位</span><span id="currentHead">当前值</span><span id="targetHead">目标值</span>
        <span id="waistName">腰围</span><input id="waist" placeholder="91" type="number" /><input id="targetWaist" placeholder="86" type="number" />
        <span id="chestName">胸围</span><input id="chest" placeholder="100" type="number" /><input id="targetChest" placeholder="104" type="number" />
        <span id="hipName">臀围</span><input id="hip" placeholder="98" type="number" /><input id="targetHip" placeholder="101" type="number" />
        <span id="armName">臂围</span><input id="arm" placeholder="34" type="number" /><input id="targetArm" placeholder="36" type="number" />
        <span id="thighName">大腿围</span><input id="thigh" placeholder="57" type="number" /><input id="targetThigh" placeholder="60" type="number" />
      </div>
    </div>

    <div class="section">
      <h2 id="prTitle">个人纪录与训练强度</h2>
      <p id="prHint" class="hint">填写“重量 + 次数”后，应用会估算个人最大力量，再据此给出训练重量；未填写时使用主观用力等级。</p>
      <div class="two-col">
        <label id="benchLabel">卧推纪录（千克 × 次）<input id="benchWeight" type="number" placeholder="60" /> <input id="benchReps" type="number" placeholder="8" /></label>
        <label id="squatLabel">深蹲纪录（千克 × 次）<input id="squatWeight" type="number" placeholder="90" /> <input id="squatReps" type="number" placeholder="6" /></label>
        <label id="rowLabel">划船/下拉纪录（千克 × 次）<input id="rowWeight" type="number" placeholder="50" /> <input id="rowReps" type="number" placeholder="10" /></label>
        <label id="hingeLabel">硬拉/臀推纪录（千克 × 次）<input id="hingeWeight" type="number" placeholder="100" /> <input id="hingeReps" type="number" placeholder="5" /></label>
      </div>
    </div>

    <button id="generate" class="primary" type="submit">生成科学计划</button>
  </form>

  <section id="result" class="card result" hidden></section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const t = { zh: { title:'塑形计划实验室', subtitle:'离线 Android 版 · 支持下载长图', profile:'基础指标与目标', sex:'性别', age:'年龄', height:'身高（厘米）', weight:'体重（千克）', fat:'体脂率（百分比）', goal:'目标类型', targetWeight:'目标体重（千克）', frequency:'每周训练次数', mode:'训练场景', experience:'训练经验', circ:'可选围度目标（厘米）', hint:'当前值和目标值需成对填写。腰围用于整体减脂评估，胸/臂/臀/大腿围可用于局部训练侧重。', area:'部位', current:'当前值', target:'目标值', waist:'腰围', chest:'胸围', hip:'臀围', arm:'臂围', thigh:'大腿围', pr:'个人纪录与训练强度', prHint:'填写“重量 + 次数”后，应用会估算个人最大力量，再据此给出训练重量；未填写时使用主观用力等级。', bench:'卧推纪录（千克 × 次）', squat:'深蹲纪录（千克 × 次）', row:'划船/下拉纪录（千克 × 次）', hinge:'硬拉/臀推纪录（千克 × 次）', generate:'生成科学计划', plan:'你的计划', cal:'每日热量', protein:'蛋白质', fatText:'脂肪', carb:'碳水化合物', logic:'计划生成逻辑', strength:'训练强度处方', why:'为什么这样安排', workouts:'每周训练安排', download:'导出长图', exportDone:'长图已保存到下载目录', saveFail:'长图保存失败，请重试', useRpe:'工作组采用主观用力等级', reps:'次余力', noPr:'未填写个人纪录，使用主观用力等级与次数区间。', oneRm:'估算个人最大力量', load:'推荐负荷', sets:'组', kilos:'千克', minutes:'分钟', length:'长图', fat_loss:'减脂 / 减重', muscle_gain:'增肌', recomposition:'体态重组', male:'男性', female:'女性', novice:'新手', intermediate:'中级', advanced:'高级', gym:'健身房', bodyweight:'自重 / 居家' }, en: { title:'Shape Plan Lab', subtitle:'Offline Android edition · long-image download supported', profile:'Baseline metrics and goal', sex:'Sex', age:'Age', height:'Height (cm)', weight:'Weight (kg)', fat:'Body fat (%)', goal:'Goal type', targetWeight:'Target weight (kg)', frequency:'Weekly sessions', mode:'Training setting', experience:'Training experience', circ:'Optional circumference targets (cm)', hint:'Enter current and target values as a pair. Waist guides overall fat-loss evaluation, while chest/arm/hip/thigh values can shift training emphasis.', area:'Area', current:'Current', target:'Target', waist:'Waist', chest:'Chest', hip:'Hip', arm:'Arm', thigh:'Thigh', pr:'Personal records and intensity', prHint:'Enter weight + reps to estimate 1RM, then use that to set training loads. Otherwise the app uses effort-based guidance.', bench:'Bench record (kg × reps)', squat:'Squat record (kg × reps)', row:'Row / pulldown record (kg × reps)', hinge:'Deadlift / hip-thrust record (kg × reps)', generate:'Generate plan', plan:'Your plan', cal:'Daily calories', protein:'Protein', fatText:'Fat', carb:'Carbohydrate', logic:'Plan generation logic', strength:'Intensity prescription', why:'Why this plan', workouts:'Weekly training schedule', download:'Export long image', exportDone:'Long image saved to downloads', saveFail:'Failed to save long image', useRpe:'Working sets use effort rating', reps:'reps in reserve', noPr:'No personal records entered; the app will use effort rating and rep ranges.', oneRm:'Estimated 1RM', load:'Recommended load', sets:'sets', kilos:'kg', minutes:'min', length:'Long image', fat_loss:'Fat loss', muscle_gain:'Muscle gain', recomposition:'Recomposition', male:'Male', female:'Female', novice:'Novice', intermediate:'Intermediate', advanced:'Advanced', gym:'Gym', bodyweight:'Bodyweight / home' } };
let en = false; let currentPlan = null;
const RANGES = { fat_loss:{ gym:{ chest:[65,75], squat:[70,80], row:[65,75], hinge:[70,80] }, bodyweight:{ chest:[10,14], squat:[12,18], row:[10,14], hinge:[12,16] } }, muscle_gain:{ gym:{ chest:[70,80], squat:[75,85], row:[70,80], hinge:[75,85] }, bodyweight:{ chest:[8,12], squat:[10,16], row:[8,12], hinge:[10,14] } }, recomposition:{ gym:{ chest:[67,77], squat:[72,82], row:[67,77], hinge:[72,82] }, bodyweight:{ chest:[9,13], squat:[11,17], row:[9,13], hinge:[11,15] } } };
const PR_IDS = ['bench','squat','row','hinge'];
function tx(){return t[en?'en':'zh'];}
function text(id,key){$(id).textContent=tx()[key];}
function label(id,key){$(id).firstChild.textContent=tx()[key];}
function fmt(n){return Math.round(n*10)/10;}
function estimate1RM(load,reps){ return load>0 && reps>0 ? load * (1 + reps / 30) : null; }
function getPr(key){ const w = Number($(key+'Weight').value); const r = Number($(key+'Reps').value); return w > 0 && r > 0 ? estimate1RM(w, r) : null; }
function applyLanguage(){ const x = tx(); document.documentElement.lang = en ? 'en' : 'zh-CN'; document.title = x.title; $('lang').textContent = en ? '中文' : 'EN'; [['title','title'],['subtitle','subtitle'],['profileTitle','profile'],['circTitle','circ'],['circHint','hint'],['prTitle','pr'],['prHint','prHint'],['generate','generate']].forEach(([id,key])=>text(id,key)); ['sexLabel','ageLabel','heightLabel','weightLabel','fatLabel','goalLabel','targetWeightLabel','frequencyLabel','modeLabel','experienceLabel','benchLabel','squatLabel','rowLabel','hingeLabel'].forEach((id,i)=>{ const map=['sex','age','height','weight','fat','goal','targetWeight','frequency','mode','experience','bench','squat','row','hinge']; label(id,map[i]); }); ['areaHead','currentHead','targetHead','waistName','chestName','hipName','armName','thighName'].forEach((id,i)=>{$(id).textContent=[x.area,x.current,x.target,x.waist,x.chest,x.hip,x.arm,x.thigh][i];}); ['sex','goal','mode','experience'].forEach(id=>{ const sel=$(id); [...sel.options].forEach(o=>{ if (o.value==='bodyweight') o.textContent=x.bodyweight; else if (o.value==='fat_loss') o.textContent=x.fat_loss; else if (o.value==='muscle_gain') o.textContent=x.muscle_gain; else if (o.value==='recomposition') o.textContent=x.recomposition; else if (o.value==='male') o.textContent=x.male; else if (o.value==='female') o.textContent=x.female; else if (o.value==='gym') o.textContent=x.gym; else if (o.value==='novice') o.textContent=x.novice; else if (o.value==='intermediate') o.textContent=x.intermediate; else if (o.value==='advanced') o.textContent=x.advanced; }); }); }
function parseNum(id){ const v = Number($(id).value); return Number.isFinite(v) && v > 0 ? v : null; }
function normalizeInput(){ const input = { sex: $('sex').value, age: Number($('age').value), heightCm: Number($('height').value), weightKg: Number($('weight').value), bodyFatPct: parseNum('fat'), goal:{ type:$('goal').value, targetWeightKg: parseNum('targetWeight') }, trainingMode:$('mode').value, frequencyPerWeek:Number($('frequency').value), trainingExperience:$('experience').value, currentCircumference:{ waistCm:parseNum('waist'), chestCm:parseNum('chest'), hipCm:parseNum('hip'), armCm:parseNum('arm'), thighCm:parseNum('thigh') }, goalCircumference:{ waistCm:parseNum('targetWaist'), chestCm:parseNum('targetChest'), hipCm:parseNum('targetHip'), armCm:parseNum('targetArm'), thighCm:parseNum('targetThigh') }, pr:{ bench:getPr('bench'), squat:getPr('squat'), row:getPr('row'), hinge:getPr('hinge') } };
  return input;
}
function normalizeGoals(input){ const notes=[]; const weight=input.weightKg; const goal=input.goal.type; if (goal==='fat_loss' && input.goal.targetWeightKg != null && input.goal.targetWeightKg >= weight) { input.goal.targetWeightKg = fmt(weight * 0.98); notes.push(en ? 'Target weight was lowered below current weight for fat loss.' : '减脂目标体重已调整为低于当前体重。'); $('targetWeight').classList.add('red'); } if (goal==='muscle_gain' && input.goal.targetWeightKg != null && input.goal.targetWeightKg <= weight) { input.goal.targetWeightKg = fmt(weight * 1.02); notes.push(en ? 'Target weight was raised above current weight for muscle gain.' : '增肌目标体重已调整为高于当前体重。'); $('targetWeight').classList.add('red'); } ['waist','chest','hip','arm','thigh'].forEach(key=>{ const c = input.currentCircumference[key+'Cm']; const tVal = input.goalCircumference[key+'Cm']; const targetField = $('target'+key[0].toUpperCase()+key.slice(1)); if (c != null && tVal != null) { if (key === 'waist' && tVal >= c) { input.goalCircumference[key+'Cm'] = fmt(c * 0.97); targetField.classList.add('red'); notes.push(en ? 'Waist target was lowered below current waist.' : '腰围目标已调整为低于当前腰围。'); } if (['chest','hip','arm','thigh'].includes(key) && tVal <= c) { input.goalCircumference[key+'Cm'] = fmt(c * 1.03); targetField.classList.add('red'); notes.push(en ? `${key} target was raised above current value.` : `${key==='chest'?'胸围':key==='hip'?'臀围':key==='arm'?'臂围':'大腿围'}目标已调整为高于当前值。`); } } }); return notes; }
function e1rmLabel(v){ return en ? `${fmt(v)} kg` : `${fmt(v)} 千克`; }
function recommendationFromPr(estimate, percent){ const load = estimate * percent / 100; return fmt(load); }
function renderPlan(plan){ const x=tx(); const intensity = plan.intensity; const result = $("result"); const metrics = `<div class="metrics"><div class="metric"><b>${plan.calories}</b><small>${x.cal}</small></div><div class="metric"><b>${plan.protein}g</b><small>${x.protein}</small></div><div class="metric"><b>${plan.fat}g</b><small>${x.fatText}</small></div><div class="metric"><b>${plan.carb}g</b><small>${x.carb}</small></div></div>`; const corrections = plan.notes.map(n=>`<p class="warning">${n}</p>`).join(''); const prBox = plan.prSummary ? `<div class="card section"><h2>${x.oneRm}</h2>${plan.prSummary.map(item=>`<div class="workout"><b>${item.name}</b><span>${x.oneRm} ${e1rmLabel(item.oneRm)} · ${x.load} ${item.recommended} ${x.kilos}</span><p class="exercise-note">${item.reason}</p></div>`).join('')}</div>` : `<div class="card section"><h2>${x.oneRm}</h2><p class="hint">${x.noPr}</p></div>`; const intensityCard = `<details open><summary>${x.strength}</summary><p>${intensity.summary}</p><div>${intensity.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div><p class="exercise-note">${intensity.progress}</p></details>`; const workouts = `<details open><summary>${x.workouts}</summary>${plan.workouts.map(day=>`<div class="workout"><b>${day.title}</b><span>${day.blocks.map(b=>`${b.sets} ${x.sets} × ${b.reps} · ${b.load} ${x.kilos}`).join(' / ')}</span><p class="exercise-note">${day.note}</p><div>${day.blocks.map(b=>`<span class="chip">${b.name}</span>`).join('')}</div></div>`).join('')}</details>`; const logic = `<details><summary>${x.logic}</summary><p>${plan.logic}</p></details>`; const reason = `<details><summary>${x.why}</summary><p>${plan.reason}</p></details>`; result.hidden = false; result.innerHTML = `<h2>${x.plan}</h2>${corrections}${metrics}${prBox}${intensityCard}${workouts}${logic}${reason}`; }
function buildPlan(input){ const notes = normalizeGoals(input); const tdee = Math.round((10*input.weightKg + 6.25*input.heightCm - 5*input.age + (input.sex === 'male' ? 5 : -161)) * 1.375); const goal = input.goal.type; const delta = goal==='fat_loss' ? -450 : goal==='muscle_gain' ? 220 : -150; const calories = tdee + delta; const protein = Math.round(input.weightKg * (goal==='fat_loss' ? 2.0 : 1.8)); const fat = Math.round(input.weightKg * 0.8); const carb = Math.max(80, Math.round((calories - protein*4 - fat*9)/4)); const exp = input.trainingExperience; const rpe = exp==='advanced' ? '8–9' : exp==='intermediate' ? '8' : '7–8'; const rir = exp==='advanced' ? '1–2' : exp==='intermediate' ? '2' : '2–3'; const prNames = en ? { bench:'Bench', squat:'Squat', row:'Row / Pulldown', hinge:'Deadlift / Hip Thrust' } : { bench:'卧推', squat:'深蹲', row:'划船 / 下拉', hinge:'硬拉 / 臀推' }; const percentByLift = { fat_loss:{ bench:72, squat:72, row:70, hinge:72 }, muscle_gain:{ bench:80, squat:78, row:78, hinge:80 }, recomposition:{ bench:76, squat:74, row:74, hinge:76 } }[goal]; const recommended = (key) => input.pr[key] ? fmt(recommendationFromPr(input.pr[key], percentByLift[key])) : null; const prSummary = PR_IDS.map(key => input.pr[key] ? ({ key, name: prNames[key], oneRm: input.pr[key], recommended: recommended(key), reason: en ? 'Based on the one-rep max estimated from your entered weight and repetitions.' : '基于你填写的重量和次数估算个人最大力量，再按目标百分比给出推荐负荷。' }) : null).filter(Boolean); const loadLabel = (key) => recommended(key) ? `${recommended(key)}` : (en ? `RPE ${rpe}` : `用力等级 ${rpe}`); const armFocus = input.currentCircumference.armCm != null && input.goalCircumference.armCm != null && input.goalCircumference.armCm > input.currentCircumference.armCm; const chestFocus = input.currentCircumference.chestCm != null && input.goalCircumference.chestCm != null && input.goalCircumference.chestCm > input.currentCircumference.chestCm; const hipFocus = input.currentCircumference.hipCm != null && input.goalCircumference.hipCm != null && input.goalCircumference.hipCm > input.currentCircumference.hipCm; const thighFocus = input.currentCircumference.thighCm != null && input.goalCircumference.thighCm != null && input.goalCircumference.thighCm > input.currentCircumference.thighCm; const waistFocus = input.currentCircumference.waistCm != null && input.goalCircumference.waistCm != null && input.goalCircumference.waistCm < input.currentCircumference.waistCm; const tags = [en ? `RPE ${rpe} · RIR ${rir}` : `用力等级 ${rpe} · 保留 ${rir} 次余力`]; if (armFocus) tags.push(en ? 'Arm target + direct arm work' : '臂围目标 + 手臂直接训练'); if (waistFocus) tags.push(en ? 'Waist target + energy deficit' : '腰围目标 + 热量缺口与有氧'); const day1 = { title: en ? 'Upper A' : '上肢 A', blocks:[ { name: en ? 'Bench press' : '卧推', sets: chestFocus ? 4 : 3, reps: goal==='muscle_gain' ? '6–8' : '8–12', loadLabel: loadLabel('bench'), unit: recommended('bench') ? tx().kilos : '' }, { name: en ? 'Lat pulldown' : '高位下拉', sets: 3, reps: '8–12', loadLabel: loadLabel('row'), unit: recommended('row') ? tx().kilos : '' } ], note: en ? 'Focus on controlled reps and keep the planned repetitions in reserve.' : '以可控节奏完成动作，并保留计划要求的余力次数。' }; const day2 = { title: en ? 'Lower A' : '下肢 A', blocks:[ { name: en ? 'Squat' : '深蹲', sets: thighFocus ? 4 : 3, reps: goal==='muscle_gain' ? '5–8' : '8–10', loadLabel: loadLabel('squat'), unit: recommended('squat') ? tx().kilos : '' }, { name: en ? 'Hip thrust' : '臀推', sets: hipFocus ? 4 : 3, reps: '8–12', loadLabel: loadLabel('hinge'), unit: recommended('hinge') ? tx().kilos : '' } ], note: en ? 'Use the estimated 1RM to choose a clean, repeatable load.' : '基于个人最大力量估算选择可重复完成的训练负荷。' }; const day3 = { title: en ? 'Upper B' : '上肢 B', blocks:[ { name: en ? 'Row / Pulldown' : '划船 / 下拉', sets: 3, reps: '8–12', loadLabel: loadLabel('row'), unit: recommended('row') ? tx().kilos : '' }, { name: en ? 'Close-grip press' : '窄距推举', sets: armFocus ? 4 : 3, reps: '8–12', loadLabel: loadLabel('bench'), unit: recommended('bench') ? tx().kilos : '' } ], note: en ? 'If the target area is arms or chest, related upper-body movements receive one extra working set.' : '如果目标涉及手臂或胸围，上肢相关动作增加 1 个工作组。' }; const day4 = { title: en ? 'Lower B' : '下肢 B', blocks:[ { name: en ? 'Romanian deadlift' : '罗马尼亚硬拉', sets: hipFocus ? 4 : 3, reps: '6–10', loadLabel: loadLabel('hinge'), unit: recommended('hinge') ? tx().kilos : '' }, { name: en ? 'Split squat' : '分腿蹲', sets: thighFocus ? 4 : 3, reps: '8–12', loadLabel: en ? `RPE ${rpe}` : `用力等级 ${rpe}`, unit: '' } ], note: en ? 'Use a moderate load that keeps form stable and supports weekly volume.' : '使用中等负荷，保证动作稳定并支撑每周训练量。' }; const workouts = input.frequencyPerWeek >= 4 ? [day1, day2, day3, day4] : input.frequencyPerWeek === 3 ? [day1, day2, day3] : [day1, day2]; const intensity = { summary: en ? `Working sets use RPE ${rpe} and keep ${rir} reps in reserve. If you entered a personal record, loads are derived from estimated one-rep max values and adjusted to the goal.` : `工作组采用主观用力等级 ${rpe}，并保留 ${rir} 次余力。如果你填写了个人纪录，系统会先估算个人最大力量，再按目标给出推荐负荷。`, tags, progress: en ? 'Increase load by about 2.5%–5% only after every working set hits the top of the rep range with stable form. For bodyweight work, increase reps, tempo control, or leverage difficulty instead of blindly adding fatigue.' : '仅当所有工作组都以标准动作达到次数上限时，再增加约 2.5%–5% 的负荷；自重动作优先增加次数、放慢离心或提高动作难度，而不是盲目堆疲劳。' };
  return { calories, protein, fat, carb, workouts, intensity, prSummary, logic: en ? `The target is probability-based, not guaranteed. The app narrows unsafe targets, assigns weekly volume to target areas, and uses objective records where available.` : `目标可达性是基于概率判断，并非结果保证。应用会收敛不安全目标、为目标部位分配每周训练量，并在有个人纪录时使用客观负荷。`, reason: en ? `The weekly plan balances energy intake, training frequency, target-area volume, and recovery so the user can actually sustain the target.` : `每周计划会平衡热量摄入、训练频率、目标部位训练量和恢复，让目标具有可执行性。`, notes };
}
function exportLongImage(plan){ const lines = [en ? 'Shape Plan Lab' : '塑形计划实验室', `${tx().cal} ${plan.calories}`, `${tx().protein} ${plan.protein}g`, `${tx().fatText} ${plan.fat}g`, `${tx().carb} ${plan.carb}g`, en ? 'Intensity prescription' : '训练强度处方', plan.intensity.summary, ...plan.intensity.tags.map(x=>`• ${x}`), ...plan.workouts.flatMap(d=>[d.title, ...d.blocks.map(b=>`${b.name} ${b.sets}${en?' sets':'组'} × ${b.reps} · ${b.loadLabel}${b.unit ? ' ' + b.unit : ''}`), d.note]), en ? 'Why this plan' : '为什么这样安排', plan.reason]; const width=1080; const lineHeight=28; const height=Math.max(760, 110 + lines.length*lineHeight); const esc=s=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); const text=lines.map((line,i)=>`<text x="64" y="${96+i*lineHeight}" font-size="${i===0?34:18}" font-weight="${i===0?700:400}" fill="${i===0?'#163022':'#2f4b3a'}">${esc(line)}</text>`).join(''); const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}"><rect width="100%" height="100%" fill="#f4f1e8"/><rect x="34" y="32" width="${width-68}" height="${height-64}" rx="8" fill="#fbfaf5" stroke="#d8ddd4"/>${text}<text x="64" y="${height-44}" font-size="14" fill="#637269">${esc(new Date().toISOString().slice(0,10))}</text></svg>`; if (window.ShapePlanAndroid && window.ShapePlanAndroid.saveSvg) { window.ShapePlanAndroid.saveSvg(svg, `shape-plan-${en?'en':'zh'}-${Date.now()}.svg`); } else { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'})); a.download=`shape-plan-${Date.now()}.svg`; a.click(); URL.revokeObjectURL(a.href); } }
function generate(e){ if(e)e.preventDefault(); document.querySelectorAll('.red').forEach(x=>x.classList.remove('red')); const input=normalizeInput(); const plan=buildPlan(input); currentPlan=plan; const x=tx(); $('result').hidden=false; $('result').innerHTML=`<h2>${x.plan}</h2>${plan.notes.map(n=>`<p class="warning">${n}</p>`).join('')}<div class="metrics"><div class="metric"><b>${plan.calories}</b><small>${x.cal}</small></div><div class="metric"><b>${plan.protein}g</b><small>${x.protein}</small></div><div class="metric"><b>${plan.fat}g</b><small>${x.fatText}</small></div><div class="metric"><b>${plan.carb}g</b><small>${x.carb}</small></div></div><div class="card section"><h2>${x.pr}</h2>${plan.prSummary.length?plan.prSummary.map(p=>`<div class="workout"><b>${p.name}</b><span>${x.oneRm} ${p.oneRm.toFixed(1)} ${x.kilos} · ${x.load} ${p.recommended} ${x.kilos}</span><p class="exercise-note">${p.reason}</p></div>`).join(''):`<p class="hint">${x.noPr}</p>`}</div><div class="card section"><h2>${x.strength}</h2><p>${plan.intensity.summary}</p><div>${plan.intensity.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div><p class="exercise-note">${plan.intensity.progress}</p></div><details class="card section" open><summary>${x.workouts}</summary>${plan.workouts.map(day=>`<div class="workout"><b>${day.title}</b><span>${day.blocks.map(b=>`${b.sets} ${x.sets} × ${b.reps} · ${b.loadLabel}${b.unit ? ' ' + b.unit : ''}`).join(' / ')}</span><p class="exercise-note">${day.note}</p><div>${day.blocks.map(b=>`<span class="chip">${b.name}</span>`).join('')}</div></div>`).join('')}</details><details class="card section"><summary>${x.logic}</summary><p>${plan.logic}</p></details><details class="card section"><summary>${x.why}</summary><p>${plan.reason}</p></details><button class="primary section" type="button" id="download">${x.download}</button>`; $('download').addEventListener('click',()=>exportLongImage(plan)); $('result').scrollIntoView({behavior:'smooth'}); }
$('form').addEventListener('submit',generate); $('lang').addEventListener('click',()=>{en=!en; applyLanguage(); if(currentPlan) generate();}); applyLanguage();
</script>
