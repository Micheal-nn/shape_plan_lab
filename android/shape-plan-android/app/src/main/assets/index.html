<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>塑形计划实验室</title>
  <style>
    :root { --ink:#173a2d; --paper:#f5f2e8; --card:#fffdf7; --line:#d8ddd4; --green:#315a44; --lime:#dcecae; --red:#b63a32; --muted:#647168; }
    * { box-sizing:border-box; } body { margin:0; color:var(--ink); background:linear-gradient(150deg,#f8f5ed,#edf2e7); font:16px/1.45 sans-serif; } main { max-width:760px; margin:auto; padding:18px 16px 42px; } header { padding:18px 0 14px; } h1 { margin:0; font:700 29px/1.15 Georgia,serif; } h2 { font-size:20px; margin:0 0 12px; } p { margin:8px 0; } .sub,.hint { color:var(--muted); font-size:13px; } .top { display:flex; justify-content:space-between; gap:12px; align-items:center; } button { border:0; border-radius:9px; padding:12px 14px; font:700 14px sans-serif; cursor:pointer; } .lang { background:#e6edda; color:var(--green); } .primary { width:100%; background:var(--green); color:white; margin-top:10px; } .card { margin-top:14px; padding:16px; border:1px solid var(--line); border-radius:12px; background:var(--card); box-shadow:0 7px 24px rgba(25,58,45,.05); } .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; } label { display:block; color:#415249; font-size:13px; font-weight:700; } input,select { width:100%; margin-top:5px; min-height:42px; padding:9px; border:1px solid #cbd4c9; border-radius:7px; color:var(--ink); background:white; font:16px sans-serif; } .measure { margin-top:10px; display:grid; grid-template-columns:.8fr 1fr 1fr; gap:8px; align-items:center; } .measure input { margin:0; } .measure span { font-size:13px; font-weight:700; } .result[hidden] { display:none; } .metrics { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; } .metric { padding:12px; background:#f0f5e8; border-radius:8px; } .metric b { display:block; font:700 23px Georgia,serif; } .metric small { color:var(--muted); } .warning { margin-top:10px; padding:10px; border-left:3px solid var(--red); background:#fff0ed; color:#74342f; font-size:13px; } details { margin-top:10px; border-top:1px solid var(--line); } summary { padding:12px 0; cursor:pointer; font-weight:700; } .workout { padding:10px 0; border-top:1px solid var(--line); } .workout b { display:block; } .tag { display:inline-block; margin:5px 4px 0 0; padding:3px 6px; border-radius:4px; background:var(--lime); font-size:11px; font-weight:700; } .red { border-color:var(--red)!important; background:#fff5f3; } @media (max-width:420px){.grid{grid-template-columns:1fr}.measure{grid-template-columns:.75fr 1fr 1fr}}
  </style>
</head>
<body><main>
  <header><div class="top"><div><h1 id="title">塑形计划实验室</h1><p id="subtitle" class="sub">离线计划生成 · 可安装 Android 版</p></div><button id="lang" class="lang">EN</button></div></header>
  <form id="form" class="card">
    <h2 id="profileTitle">基础指标与目标</h2>
    <div class="grid">
      <label id="sexLabel">性别<select id="sex"><option value="male">男性</option><option value="female">女性</option></select></label>
      <label id="ageLabel">年龄<input id="age" type="number" value="30" min="16" max="90" /></label>
      <label id="heightLabel">身高（厘米）<input id="height" type="number" value="175" /></label>
      <label id="weightLabel">体重（千克）<input id="weight" type="number" value="82" step="0.1" /></label>
      <label id="fatLabel">体脂率（百分比）<input id="fat" type="number" value="24" step="0.1" /></label>
      <label id="goalLabel">目标类型<select id="goal"><option value="fat_loss">减脂 / 减重</option><option value="muscle_gain">增肌</option><option value="recomposition">体态重组</option></select></label>
      <label id="targetWeightLabel">目标体重（千克）<input id="targetWeight" type="number" value="74" step="0.1" /></label>
      <label id="frequencyLabel">每周训练次数<select id="frequency"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select></label>
      <label id="modeLabel">训练场景<select id="mode"><option value="gym">健身房</option><option value="bodyweight">自重 / 居家</option></select></label>
      <label id="experienceLabel">训练经验<select id="experience"><option value="novice">新手</option><option value="intermediate">中级</option><option value="advanced">高级</option></select></label>
    </div>
    <h2 id="circTitle" style="margin-top:20px">可选围度目标（厘米）</h2><p id="circHint" class="hint">当前值和目标值需成对填写。腰围用于整体减脂评估，手臂围可提高直接训练量。</p>
    <div class="measure"><span id="areaHead">部位</span><span id="currentHead">当前值</span><span id="targetHead">目标值</span><span id="waistName">腰围</span><input id="waist" placeholder="91" type="number" /><input id="targetWaist" placeholder="86" type="number" /><span id="armName">臂围</span><input id="arm" placeholder="34" type="number" /><input id="targetArm" placeholder="36" type="number" /></div>
    <button id="generate" class="primary" type="submit">生成科学计划</button>
  </form>
  <section id="result" class="card result" hidden></section>
</main>
<script>
const $=id=>document.getElementById(id); let en=false;
const t={zh:{title:'塑形计划实验室',subtitle:'离线计划生成 · 可安装 Android 版',profile:'基础指标与目标',sex:'性别',age:'年龄',height:'身高（厘米）',weight:'体重（千克）',fat:'体脂率（百分比）',goal:'目标类型',targetWeight:'目标体重（千克）',frequency:'每周训练次数',mode:'训练场景',experience:'训练经验',circ:'可选围度目标（厘米）',hint:'当前值和目标值需成对填写。腰围用于整体减脂评估，手臂围可提高直接训练量。',area:'部位',current:'当前值',target:'目标值',waist:'腰围',arm:'臂围',generate:'生成科学计划',plan:'你的计划',cal:'每日热量',protein:'蛋白质',fatText:'脂肪',carb:'碳水化合物',logic:'计划生成逻辑',intensity:'训练强度处方',workouts:'每周训练安排',reason:'为什么这样安排',gym:'健身房',home:'自重 / 居家',male:'男性',female:'女性',novice:'新手',intermediate:'中级',advanced:'高级',fat_loss:'减脂 / 减重',muscle_gain:'增肌',recomposition:'体态重组'},en:{title:'Shape Plan Lab',subtitle:'Offline plan generation · installable Android edition',profile:'Baseline metrics and goal',sex:'Sex',age:'Age',height:'Height (cm)',weight:'Weight (kg)',fat:'Body fat (%)',goal:'Goal type',targetWeight:'Target weight (kg)',frequency:'Sessions per week',mode:'Training setting',experience:'Training experience',circ:'Optional circumference targets (cm)',hint:'Enter current and target values as a pair. Waist guides overall fat-loss evaluation; arm circumference can increase direct training volume.',area:'Area',current:'Current',target:'Target',waist:'Waist',arm:'Arm',generate:'Generate plan',plan:'Your plan',cal:'Daily calories',protein:'Protein',fatText:'Fat',carb:'Carbohydrate',logic:'Plan generation logic',intensity:'Intensity prescription',workouts:'Weekly training schedule',reason:'Why this plan',gym:'Gym',home:'Bodyweight / home',male:'Male',female:'Female',novice:'Novice',intermediate:'Intermediate',advanced:'Advanced',fat_loss:'Fat loss',muscle_gain:'Muscle gain',recomposition:'Recomposition'}};
function tx(){return t[en?'en':'zh']} function setText(id,k){$(id).textContent=tx()[k]} function setLabel(id,k){$(id).firstChild.textContent=tx()[k]}
function translate(){const x=tx(); document.documentElement.lang=en?'en':'zh-CN'; document.title=x.title; $('lang').textContent=en?'中文':'EN'; ['title','subtitle','profileTitle','circTitle','circHint','areaHead','currentHead','targetHead','waistName','armName','generate'].forEach(k=>setText(k,k)); [['sexLabel','sex'],['ageLabel','age'],['heightLabel','height'],['weightLabel','weight'],['fatLabel','fat'],['goalLabel','goal'],['targetWeightLabel','targetWeight'],['frequencyLabel','frequency'],['modeLabel','mode'],['experienceLabel','experience']].forEach(([id,k])=>setLabel(id,k)); [['sex',['male','female']],['goal',['fat_loss','muscle_gain','recomposition']],['mode',['gym','home']],['experience',['novice','intermediate','advanced']]].forEach(([id,keys])=>keys.forEach(k=>$(id).querySelector(`[value="${k==='home'?'bodyweight':k}"]`).textContent=x[k])); if(!$('result').hidden) generate();}
function val(id){return Number($(id).value)} function correction(id,value){const e=$(id); e.value=value; e.classList.add('red')}
function generate(e){if(e)e.preventDefault(); document.querySelectorAll('.red').forEach(x=>x.classList.remove('red')); const x=tx(),weight=val('weight'),fat=val('fat'),goal=$('goal').value,frequency=val('frequency'),exp=$('experience').value; let target=val('targetWeight'),correct=[]; if(goal==='fat_loss'&&target>=weight){target=(weight*.98).toFixed(1);correction('targetWeight',target);correct.push(en?'Target weight was lowered below current weight for fat loss.':'减脂目标体重已调整为低于当前体重。')} if(goal==='muscle_gain'&&target<=weight){target=(weight*1.02).toFixed(1);correction('targetWeight',target);correct.push(en?'Target weight was raised above current weight for muscle gain.':'增肌目标体重已调整为高于当前体重。')} const bmr=10*weight+6.25*val('height')-5*val('age')+($('sex').value==='male'?5:-161),tdee=Math.round(bmr*1.375),delta=goal==='fat_loss'?-450:goal==='muscle_gain'?220:-150,kcal=Math.round(tdee+delta),protein=Math.round(weight*(goal==='fat_loss'?2:1.8)),fatG=Math.round(weight*.8),carb=Math.max(80,Math.round((kcal-protein*4-fatG*9)/4)),rir=exp==='advanced'?'1–2':exp==='intermediate'?'2':'2–3',rpe=exp==='advanced'?'8–9':exp==='intermediate'?'8':'7–8',armFocus=val('arm')&&val('targetArm')>val('arm'),waistFocus=val('waist')&&val('targetWaist')<val('waist'); const moves=$('mode').value==='gym'?(goal==='fat_loss'?['Barbell squat','Bench press','Lat pulldown','Romanian deadlift']:['Bench press','Lat pulldown','Barbell squat','Hip thrust']):['Bodyweight squat','Push-up','Inverted row','Glute bridge']; const labels=en?{sets:'sets',reason:`Calories are ${delta} kcal/day relative to estimated expenditure. Protein supports recovery. ${frequency} weekly sessions create repeatable training exposure.`,int:`Use RPE ${rpe}, keeping ${rir} repetitions in reserve. Increase load by 2.5–5% only after every set reaches the top of its repetition range with sound form.`,plan:`Target range is model-based, not guaranteed: complete training, keep weekly calorie averages close to target, and review after two weeks if the trend diverges.`}:{sets:'组',reason:`热量相对日常总消耗为 ${delta} 千卡/天；蛋白质用于支持恢复。每周 ${frequency} 次训练提供可重复的训练刺激。`,int:`工作组采用主观用力等级 ${rpe}，每组结束保留 ${rir} 次余力。仅当全部工作组以标准动作达到次数上限时，才增加约 2.5%–5% 的负荷。`,plan:'目标可达性是基于模型的概率判断，并非结果保证：需完成训练、保持热量周平均接近目标，并在连续两周趋势偏离时复评。'}; const armSet=armFocus?4:3; $('result').hidden=false; $('result').innerHTML=`<h2>${x.plan}</h2>${correct.map(c=>`<p class="warning">${c}</p>`).join('')}<div class="metrics"><div class="metric"><b>${kcal}</b><small>${x.cal}</small></div><div class="metric"><b>${protein}g</b><small>${x.protein}</small></div><div class="metric"><b>${fatG}g</b><small>${x.fatText}</small></div><div class="metric"><b>${carb}g</b><small>${x.carb}</small></div></div><details open><summary>${x.logic}</summary><p>${labels.plan}</p><p>${labels.reason}</p></details><details><summary>${x.intensity}</summary><p>${labels.int}</p>${armFocus?`<span class="tag">${en?'Biceps and triceps: 8 hard sets/week':'肱二头与肱三头：每周 8 个有效组'}</span>`:''}${waistFocus?`<span class="tag">${en?'Waist: energy balance plus cardio':'腰围：整体能量平衡加有氧训练'}</span>`:''}</details><details open><summary>${x.workouts}</summary>${moves.map((m,i)=>`<div class="workout"><b>${m}${armFocus&&i<2?` <span class="tag">${en?'Target volume +1':'目标部位加组'}</span>`:''}</b><span>${armFocus&&i<2?armSet:3} ${labels.sets} × ${i<2?'8–12':'10–15'} · ${en?`RPE ${rpe}`:`用力等级 ${rpe}`}</span></div>`).join('')}</details><details><summary>${x.reason}</summary><p>${labels.reason}</p></details>`; $('result').scrollIntoView({behavior:'smooth'});}
$('form').addEventListener('submit',generate); $('lang').addEventListener('click',()=>{en=!en;translate()}); translate();
</script></body></html>
